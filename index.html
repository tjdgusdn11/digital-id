<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>모바일신분증</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f5f5f5;
    }

    .container {
      padding: 15px;
      max-width: 500px;
      margin: auto;
    }

    .title {
      font-weight: bold;
      margin-bottom: 10px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .photo {
      width: 70px;
      height: 70px;
      background: #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    .info {
      font-size: 14px;
    }

    .name {
      font-weight: bold;
    }

    .progress-wrap {
      margin-top: 15px;
    }

    .progress-text {
      font-size: 14px;
      margin-bottom: 5px;
    }

    .progress {
      height: 6px;
      background: #ddd;
      border-radius: 10px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      width: 100%;
      background: linear-gradient(to right, blue, purple);
      animation: load 30s linear infinite;
    }

    @keyframes load {
      from { width: 100%; }
      to { width: 0%; }
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: black;
      color: white;
      font-size: 16px;
    }

    .qr {
      display: none;
      margin-top: 15px;
      text-align: center;
    }

    .qr img {
      width: 180px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="title">모바일 신분증</div>

  <div class="card">
    <div class="photo">사진</div>

    <div class="info">
      <div class="name">성현우</div>
      <div>060219-*******</div>
      <div>전주시 덕진구</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-text">30초</div>

    <div class="progress">
      <div class="bar"></div>
    </div>
  </div>

  <button onclick="showQR()">QR 표시</button>

  <div class="qr" id="qr">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=IDCARD">
  </div>

</div>

<script>
  function showQR() {
    const qr = document.getElementById("qr");
    qr.style.display = qr.style.display === "block" ? "none" : "block";
  }
</script>

</body>
</html>
